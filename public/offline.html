<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>CashBash Offline</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, sans-serif;
        background: #fafafa;
        color: #0f172a;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, rgba(16, 185, 129, 0.12), transparent 26%), #fafafa;
      }

      .card {
        width: min(440px, calc(100vw - 32px));
        border-radius: 28px;
        padding: 28px;
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(18px);
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
        border: 1px solid rgba(15, 23, 42, 0.06);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 30px;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: #475569;
      }

      a {
        display: inline-flex;
        margin-top: 18px;
        border-radius: 16px;
        padding: 12px 16px;
        background: #10b981;
        color: white;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You’re offline</h1>
      <p>CashBash saved your recent screens and app shell locally. Reconnect to sync balances, fetch insights, and refresh live transactions.</p>
      <a href="/dashboard">Open cached dashboard</a>
    </main>
  </body>
</html>
